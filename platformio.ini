[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
framework = arduino
monitor_speed = 115200
lib_deps = 
	adafruit/Adafruit GFX Library@^1.12.1
	arduino-libraries/TFT@^1.0.6
	strange-v/MHZ19
	robtillaart/CHT8305@^0.2.2
